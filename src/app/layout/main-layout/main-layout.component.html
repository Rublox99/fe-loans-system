<main class="flex flex-col size-full">
  <!-- Navbar -->
  <section class="flex flex-none h-[65px] gap-5 bg-lowContrast items-center px-[25px] py-[16px]">
    <!-- Robust title -->
    <span class="flex-none font-sans text-2xl font-bold text-primary">Robust</span>

    <!-- Tabs -->
    <div class="flex-auto flex gap-2.5 items-center">
      <ul nz-menu nzMode="horizontal" class="flex-1 border-0">
        @for (route of appRoutes; track $index) {
        <li nz-menu-item [routerLink]="route.path" routerLinkActive="ant-menu-item-selected"
          [routerLinkActiveOptions]="{exact: false}">
          {{route.label}}
        </li>
        }
      </ul>
    </div>

    <!-- Sign out -->
    <div class="flex items-center flex-none gap-5">
      <!-- Button -->
      <web-icon class="pseudo__button" name="SIGN_OUT" color="var(--error)" (click)="signOut()" />
      <!-- Initials -->
      <div class="cursor-default rounded-md size-[26px] bg-fuchsia-500 flex justify-center items-center">
        <span class="text-white font-roboto">AD</span>
      </div>
    </div>
  </section>

  <!-- Routed contend -->
  <router-outlet/>
</main>
